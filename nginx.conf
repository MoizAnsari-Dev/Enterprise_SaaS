server {
    listen 80;

    # Route /auth directly to the auth-backend service
    location /auth/ {
        proxy_pass http://auth-backend:8000/;
        proxy_set_header Host $host;
    }

    # Route /api directly to the backend service
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
    }

    # Route everything else to the Angular frontend
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
    }
}
